name: CI/CD Pipeline - Projekt Pogoda

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Klonowanie kodu repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Konfiguracja QEMU (wymagane do emulacji wielu architektur)
      - name: Set up QEMU
        uses: actions/setup-qemu-action@v3

      # 3. Konfiguracja Docker Buildx
      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      # 4. Logowanie do Docker Hub (na potrzeby przechowywania CACHE)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Logowanie do GitHub Container Registry (GHCR.io)
      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Etap lokalnego budowania obrazu na potrzeby skanowania CVE
      - name: Build local image for CVE scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Ładuje obraz lokalnie do demona Dockera na maszynie runnera
          tags: local-test-image:latest

      # 7. Test CVE za pomocą sKanera Trivy
      # Warunek 'c' zadania: Przerywa pipeline jeśli znajdzie błędy HIGH lub CRITICAL
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'table'
          exit-code: '1' # Zwraca kod błędu 1, co zatrzymuje potok
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 8. Budowanie wieloplatformowe i wysyłka (tylko gdy Trivy przejdzie pomyślnie)
      # Warunek 'a' i 'b' zadania
      - name: Build and push multi-arch image with registry cache
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.makson1402 }}/projekt-pogoda-cache:max
          cache-to: type=registry,ref=${{ secrets.makson1402 }}/projekt-pogoda-cache:max,mode=max